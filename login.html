<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>福利吧聊天室 - 登录</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, 'Microsoft YaHei', sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      display: flex; justify-content: center; align-items: center;
      min-height: 100vh; padding: 20px;
    }
    .container {
      background: white; border-radius: 16px; box-shadow: 0 20px 60px rgba(0,0,0,0.3);
      padding: 40px; width: 100%; max-width: 440px;
    }
    h1 { text-align: center; color: #333; margin-bottom: 8px; font-size: 26px; }
    .subtitle { text-align: center; color: #999; margin-bottom: 30px; font-size: 14px; }

    label { display: block; margin-bottom: 8px; color: #555; font-size: 14px; font-weight: 600; }
    textarea {
      width: 100%; min-height: 110px; padding: 12px;
      border: 2px solid #e8e8e8; border-radius: 10px;
      font-size: 13px; font-family: 'SF Mono', Consolas, monospace;
      resize: vertical; transition: border-color 0.2s;
    }
    textarea:focus { outline: none; border-color: #667eea; }

    .hint { font-size: 12px; color: #888; margin-top: 8px; line-height: 1.6; }
    .hint code { background: #f0f0f0; padding: 2px 6px; border-radius: 4px; font-size: 11px; }

    .btn {
      width: 100%; padding: 14px;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: white; border: none; border-radius: 10px;
      font-size: 16px; font-weight: 600; cursor: pointer;
      transition: all 0.2s; margin-top: 20px;
    }
    .btn:hover { transform: translateY(-2px); box-shadow: 0 8px 24px rgba(102,126,234,0.4); }
    .btn:disabled { opacity: 0.6; cursor: not-allowed; transform: none; }

    .status {
      margin-top: 15px; padding: 12px; border-radius: 8px;
      font-size: 13px; display: none;
    }
    .status.error { display: block; background: #fff5f5; color: #c53030; border: 1px solid #fed7d7; }
    .status.info { display: block; background: #ebf8ff; color: #2c5282; border: 1px solid #bee3f8; }
  </style>
</head>
<body>
  <div class="container">
    <h1>💬 福利吧聊天室</h1>
    <p class="subtitle">输入 Cookie 进入聊天</p>

    <label for="cookies">Cookie</label>
    <textarea id="cookies" placeholder="S5r8_2132_auth=xxx; S5r8_2132_saltkey=xxx; ..."></textarea>
    <p class="hint">
      浏览器登录福利吧 → 按 <code>F12</code> → <b>Network</b> 标签 → 点任意请求 → 复制 Request Headers 里的 <code>Cookie</code> 值
    </p>

    <button class="btn" id="loginBtn" onclick="login()">进入聊天室</button>

    <div id="status" class="status"></div>
  </div>

  <script>
    function login() {
      const cookies = document.getElementById('cookies').value.trim();
      const btn = document.getElementById('loginBtn');

      if (!cookies) { showStatus('请输入 Cookie', 'error'); return; }
      if (!cookies.includes('=')) { showStatus('Cookie 格式不正确', 'error'); return; }

      btn.disabled = true;
      showStatus('正在进入...', 'info');
      window.electronAPI.sendCookies(cookies);
    }

    function showStatus(msg, type) {
      const el = document.getElementById('status');
      el.textContent = msg;
      el.className = 'status ' + type;
    }

    const saved = localStorage.getItem('fuliba_cookies');
    if (saved) document.getElementById('cookies').value = saved;
    document.getElementById('cookies').addEventListener('change', (e) => {
      localStorage.setItem('fuliba_cookies', e.target.value);
    });
  </script>
</body>
</html>
