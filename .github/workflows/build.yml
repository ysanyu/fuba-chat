name: Build Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  release:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            platform: mac
          - os: windows-latest
            platform: win
          - os: ubuntu-latest
            platform: linux

    env:
      ELECTRON_MIRROR: https://npmmirror.com/mirrors/electron/

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install Linux dependencies (for .deb / .rpm)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y rpm libarchive-tools fakeroot

      - name: Install dependencies
        run: npm ci

      - name: Build (${{ matrix.platform }})
        run: npm run build:${{ matrix.platform }}

      - name: List build outputs
        if: always()
        shell: bash
        run: ls -lhR releases/ || true

      - name: Upload artifacts
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: release-${{ matrix.platform }}
          path: |
            releases/*.dmg
            releases/*.zip
            releases/*.exe
            releases/*.AppImage
            releases/*.deb
            releases/*.rpm
          retention-days: 7
          if-no-files-found: ignore

      - name: Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            releases/*.dmg
            releases/*.zip
            releases/*.exe
            releases/*.AppImage
            releases/*.deb
            releases/*.rpm
          draft: false
          generate_release_notes: true
          fail_on_unmatched_files: false
