<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>福利吧聊天室</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, 'Microsoft YaHei', 'PingFang SC', sans-serif;
      background: #f0f2f5; height: 100vh; display: flex; flex-direction: column; overflow: hidden;
    }

    .header {
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: white; padding: 12px 20px; display: flex; align-items: center;
      justify-content: space-between; box-shadow: 0 2px 8px rgba(0,0,0,0.1); flex-shrink: 0;
    }
    .header-title { display: flex; align-items: center; gap: 8px; font-size: 16px; font-weight: 600; }
    .header-dot { width: 8px; height: 8px; background: #4ade80; border-radius: 50%; box-shadow: 0 0 8px rgba(74,222,128,0.6); }
    .header-dot.offline { background: #f87171; box-shadow: 0 0 8px rgba(248,113,113,0.6); }
    .header-info { font-size: 12px; opacity: 0.85; }

    .messages {
      flex: 1; overflow-y: auto; padding: 16px 20px; scroll-behavior: smooth;
    }
    .messages::-webkit-scrollbar { width: 6px; }
    .messages::-webkit-scrollbar-track { background: transparent; }
    .messages::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 3px; }

    .msg { display: flex; gap: 10px; margin-bottom: 14px; align-items: flex-start; }
    .msg.me { flex-direction: row-reverse; }
    .msg-avatar { width: 36px; height: 36px; border-radius: 50%; flex-shrink: 0; overflow: hidden; background: #e2e8f0; }
    .msg-avatar img { width: 100%; height: 100%; object-fit: cover; }

    .msg-body { max-width: 70%; display: flex; flex-direction: column; }
    .msg.me .msg-body { align-items: flex-end; }

    .msg-meta { display: flex; align-items: center; gap: 8px; margin-bottom: 4px; font-size: 12px; }
    .msg-name { color: #667eea; font-weight: 600; }
    .msg.me .msg-name { color: #764ba2; }
    .msg-time { color: #94a3b8; font-size: 11px; }

    .msg-quote {
      background: #f1f5f9; padding: 4px 8px; border-radius: 6px;
      border-left: 3px solid #cbd5e1; font-size: 12px; color: #64748b;
      margin-bottom: 4px; max-width: 100%; overflow: hidden;
      text-overflow: ellipsis; white-space: nowrap;
    }

    .msg-bubble {
      background: white; padding: 8px 14px; border-radius: 14px; border-top-left-radius: 4px;
      font-size: 14px; line-height: 1.5; color: #1e293b;
      word-break: break-word; box-shadow: 0 1px 2px rgba(0,0,0,0.05);
    }
    .msg.me .msg-bubble {
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); color: white;
      border-top-left-radius: 14px; border-top-right-radius: 4px;
    }
    .msg-bubble a { color: #93c5fd; text-decoration: none; }
    .msg-bubble a:hover { text-decoration: underline; }

    .msg-actions { display: flex; gap: 8px; margin-top: 4px; font-size: 11px; }
    .msg-action { color: #94a3b8; cursor: pointer; user-select: none; }
    .msg-action:hover { color: #667eea; }

    .sys-msg { text-align: center; color: #94a3b8; font-size: 12px; padding: 8px; margin: 8px 0; }
    .loading { text-align: center; padding: 40px; color: #94a3b8; }
    .spinner {
      display: inline-block; width: 24px; height: 24px; border: 3px solid #e2e8f0;
      border-top-color: #667eea; border-radius: 50%; animation: spin 0.8s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* 回复栏 */
    .reply-bar {
      display: none; align-items: center; justify-content: space-between;
      padding: 6px 20px; background: #eef2ff; font-size: 12px; color: #475569;
      border-bottom: 1px solid #e2e8f0; flex-shrink: 0;
    }
    .reply-bar.show { display: flex; }
    .reply-close { cursor: pointer; color: #94a3b8; font-size: 16px; padding: 0 4px; }
    .reply-close:hover { color: #ef4444; }

    /* 表情面板 */
    .emoji-panel {
      display: none; position: absolute; bottom: 60px; left: 20px;
      background: white; border-radius: 10px; box-shadow: 0 8px 24px rgba(0,0,0,0.15);
      padding: 10px; max-width: 320px; z-index: 100;
    }
    .emoji-panel.show { display: block; }
    .emoji-grid { display: grid; grid-template-columns: repeat(10, 1fr); gap: 4px; }
    .emoji-item { font-size: 20px; cursor: pointer; text-align: center; padding: 2px; border-radius: 4px; transition: background 0.1s; }
    .emoji-item:hover { background: #f1f5f9; }

    /* 输入区 */
    .input-area {
      padding: 12px 20px; background: white; border-top: 1px solid #e2e8f0;
      display: flex; gap: 10px; align-items: flex-end; position: relative; flex-shrink: 0;
    }
    .emoji-btn {
      width: 36px; height: 36px; border: none; background: #f1f5f9; border-radius: 8px;
      font-size: 18px; cursor: pointer; flex-shrink: 0; transition: background 0.2s;
    }
    .emoji-btn:hover { background: #e2e8f0; }
    .input-area textarea {
      flex: 1; border: 2px solid #e8e8f0; border-radius: 10px; padding: 8px 12px;
      font-size: 14px; font-family: inherit; resize: none; min-height: 36px; max-height: 90px;
      transition: border-color 0.2s; line-height: 1.5;
    }
    .input-area textarea:focus { outline: none; border-color: #667eea; }

    .send-btn {
      padding: 8px 20px; background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: white; border: none; border-radius: 10px; font-size: 14px; font-weight: 600;
      cursor: pointer; flex-shrink: 0; transition: all 0.2s;
    }
    .send-btn:hover { transform: translateY(-1px); box-shadow: 0 4px 12px rgba(102,126,234,0.4); }
    .send-btn:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }

    .guest-notice { padding: 20px; text-align: center; color: #94a3b8; font-size: 14px; }
    .guest-notice a { color: #667eea; cursor: pointer; }
  </style>
</head>
<body>

<div class="header">
  <div class="header-title"><span class="header-dot" id="statusDot"></span><span>福利吧聊天室</span></div>
  <div class="header-info" id="headerInfo">连接中...</div>
</div>

<div class="reply-bar" id="replyBar">
  <span id="replyText"></span>
  <span class="reply-close" onclick="clearReply()">&times;</span>
</div>

<div class="messages" id="messages">
  <div class="loading"><div class="spinner"></div><p style="margin-top:12px">正在加载消息...</p></div>
</div>

<div class="emoji-panel" id="emojiPanel"><div class="emoji-grid" id="emojiGrid"></div></div>

<div id="inputArea" class="input-area">
  <button class="emoji-btn" onclick="toggleEmoji()">😊</button>
  <textarea id="msgInput" placeholder="说点什么... (Enter 发送, Shift+Enter 换行)" rows="1"></textarea>
  <button class="send-btn" id="sendBtn" onclick="send()">发送</button>
</div>

<div id="guestNotice" class="guest-notice" style="display:none"></div>

<script>
const API = 'https://fuliba2023.net/plugin.php?id=chatroom:api';
const EMOJIS = ['😀','😁','😂','🤣','😊','😍','😘','😜','🤔','😎','😭','😡','👍','👎','👏','🙏','💪','🤝','👌','✌️','🎉','❤️','💔','🔥','⭐','🌹','☕','🍺','🎁','💰','😴','😱','😅','😉','😏','🙄','😤','🥰','😋','🤗','🤩','😇','🤤','😢','😩','💯','✅','❌','❓','❗','🐶','🐱','🌚','🌝','🍉','🚀'];

let state = { lastid: 0, myUid: 0, cansend: false, canmanage: false,
  reply: null, seen: {}, serverOffset: 0, sending: false, formhash: '', retryCount: 0 };

// ========== 工具函数 ==========
function esc(s) { return String(s).replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'})[c]); }
function linkify(s) { return s.replace(/(https?:\/\/[^\s<]+)/g,'<a href="$1" target="_blank">$1</a>'); }
function pad(n){return n<10?'0'+n:''+n}
function fmtTime(t){
  const n=Math.floor(Date.now()/1000)+state.serverOffset,d=n-t;
  if(d<60)return'刚刚';if(d<3600)return Math.floor(d/60)+'分钟前';
  const dt=new Date(t*1000),today=new Date();
  if(dt.toDateString()===today.toDateString())return pad(dt.getHours())+':'+pad(dt.getMinutes());
  return(dt.getMonth()+1)+'-'+dt.getDate()+' '+pad(dt.getHours())+':'+pad(dt.getMinutes());
}
function nearBottom(){const el=document.getElementById('messages');return el.scrollHeight-el.scrollTop-el.clientHeight<100}

// ========== API 调用（渲染进程 fetch，自动携带 session cookie）==========
async function api(op,params,method){
  let url=API+'&op='+op+'&inajax=1',body=null;
  if(params&&Object.keys(params).length){
    if(method==='POST'){
      body=Object.keys(params).map(k=>encodeURIComponent(k)+'='+encodeURIComponent(params[k])).join('&');
    }else{
      url+='&'+Object.keys(params).map(k=>encodeURIComponent(k)+'='+encodeURIComponent(params[k])).join('&');
    }
  }
  try{
    const r=await fetch(url,{method:method||'GET',headers:{'X-Requested-With':'XMLHttpRequest',...(method==='POST'?{'Content-Type':'application/x-www-form-urlencoded'}:{})},body,credentials:'omit'});
    const t=await r.text();
    
    // 🔍 调试：输出 API 响应
    console.log('[API] op='+op+' | status='+r.status+' | body前200字:', t.substring(0,200));
    
    let data;
    try{data=JSON.parse(t);}catch(e){return{ok:false,error:'解析失败:'+t.substring(0,200)}}
    if(typeof data==='string'||(!data.ok&&data.error===undefined)){
      return{ok:false,error:'服务器响应异常',raw:t.substring(0,300)};
    }
    return{ok:true,data:data};
  }catch(e){console.error('[API] 网络错误:',e);return{ok:false,error:e.message}}
}

// ========== 获取 formhash ==========
async function fetchFormhash(){
  try{
    const r=await fetch('https://fuliba2023.net/forum.php');
    const t=await r.text();
    let m=t.match(/CHATROOM_CONFIG\s*=\s*{[^}]*?formhash\s*:\s*"([^"]+)"/i);
    if(m&&m[1]){state.formhash=m[1];return state.formhash;}
    m=t.match(/formhash=([a-z0-9]{6,})/i)||t.match(/"formhash"\s*:\s*"([a-z0-9]+)"/i);
    if(m&&m[1]){state.formhash=m[1];return state.formhash;}
  }catch(e){}
  return '';
}

// ========== 消息渲染 ==========
function appendMsg(m){
  if(state.seen[m.id])return;state.seen[m.id]=true;
  const c=document.getElementById('messages'),me=state.myUid>0&&String(m.uid)===String(state.myUid);
  const d=document.createElement('div');d.className='msg'+(me?' me':'');d.dataset.id=m.id;
  let q='';if(m.replyid&&m.replymessage)q=`<div class="msg-quote">回复 @${esc(m.replyusername)}：${esc(m.replymessage)}</div>`;
  let a='';if(state.cansend)a=`<div class="msg-actions"><span class="msg-action" onclick="setReply(${m.id},'${esc(m.username)}')">回复</span></div>`;
  d.innerHTML=`<div class="msg-avatar"><img src="${esc(m.avatar)}" onerror="this.style.display='none'" alt=""></div><div class="msg-body"><div class="msg-meta"><span class="msg-name">${esc(m.username)}</span><span class="m-time">${fmtTime(m.dateline)}</span></div>${q}<div class="msg-bubble">${linkify(esc(m.message))}</div>${a}</div>`;
  c.appendChild(d);
  while(c.children.length>300){const f=c.firstChild,id=f.getAttribute('data-id');if(id)delete state.seen[id];c.removeChild(f);}
  c.scrollTop=c.scrollHeight;
}
function sysMsg(t){const c=document.getElementById('messages'),d=document.createElement('div');d.className='sys-msg';d.textContent=t;c.appendChild(d);c.scrollTop=c.scrollHeight;}

// ========== 轮询消息 ==========
async function fetchMsgs(initial){
  try{
    const p={};
    if(state.lastid>0||!initial)p.lastid=state.lastid;
    const r=await api('list',p,'GET');
    if(!r.ok){dotOff();info('连接失败');return;}
    const d=r.data;
    if(!d.ok){
      dotOff();info(d.error||'请求失败');
      if(initial&&state.retryCount<5){state.retryCount++;sysMsg((d.error||'加载失败')+'，重试 '+state.retryCount+'/5...');setTimeout(()=>fetchMsgs(true),state.retryCount*3000);return;}
      return;
    }
    state.retryCount=0;
    if(d.you){state.myUid=d.you.uid||0;state.cansend=!!d.you.cansend;state.canmanage=!!d.you.canmanage;}
    if(d.servertime)state.serverOffset=d.servertime-Math.floor(Date.now()/1000);
    if(d.messages&&d.messages.length>0){
      const nb=nearBottom();
      d.messages.forEach(m=>{appendMsg(m);if(m.id>state.lastid)state.lastid=m.id;});
      if(!initial&&nb)document.getElementById('messages').scrollTop=document.getElementById('messages').scrollHeight;
    }
    if(d.deleted)d.deleted.forEach(id=>{const e=document.querySelector(`.msg[data-id="${id}"]`);if(e)e.remove();delete state.seen[id];});
    document.querySelector('.loading')?.remove();
    if(initial&&(!d.messages||!d.messages.length))sysMsg('还没有人发言~');
    dotOn();info(state.cansend?'已登录':state.myUid>0?'只读模式':'游客模式');
    updateInput();
  }catch(e){
    console.error(e);dotOff();
    if(initial&&state.retryCount<5){state.retryCount++;setTimeout(()=>fetchMsgs(true),state.retryCount*3000);}
  }
}
function dotOn(){document.getElementById('statusDot').classList.remove('offline')}
function dotOff(){document.getElementById('statusDot').classList.add('offline')}
function info(s){document.getElementById('headerInfo').textContent=s}

// ========== 发送消息 ==========
async function send(){
  const input=document.getElementById('msgInput'),btn=document.getElementById('sendBtn'),msg=input.value.trim();
  if(!msg||state.sending)return;
  if(!state.cansend){alert('你暂时无法发言');return;}
  if(msg.length>400){alert('消息太长');return;}
  if(!state.formhash){btn.disabled=true;btn.textContent='验证中...';await fetchFormhash();}
  if(!state.formhash){alert('无法获取验证码');return;}
  state.sending=true;btn.disabled=true;btn.textContent='发送中...';
  try{
    const params={message:msg,formhash:state.formhash};
    if(state.reply)params.replyid=state.reply.id;
    const r=await api('send',params,'POST');
    const rd=r.data;
    if(r.ok&&rd&&rd.ok){input.value='';input.style.height='36px';clearReply();setTimeout(()=>fetchMsgs(false),300);}
    else{const err=(rd&&(rd.error||rd.msg))||(typeof r.data==='string'?r.data.substring(0,200):'发送失败');
    if(err.includes('过期')){alert('会话已过期，请重新启动应用');await fetchFormhash();}else alert(err);}
  }catch(e){alert('发送失败:'+e.message)}
  finally{state.sending=false;btn.disabled=false;btn.textContent='发送'}
}

// ========== 回复 ==========
function setReply(id,name){if(!state.cansend)return;state.reply={id,name};document.getElementById('replyText').textContent='回复 @'+name;document.getElementById('replyBar').classList.add('show');document.getElementById('msgInput').focus()}
function clearReply(){state.reply=null;document.getElementById('replyBar').classList.remove('show')}

// ========== 表情 ==========
function toggleEmoji(){document.getElementById('emojiPanel').classList.toggle('show')}
function initEmoji(){document.getElementById('emojiGrid').innerHTML=EMOJIS.map(e=>`<span class="emoji-item" onclick="insEm('${e}')">${e}</span>`).join('')}
function insEm(e){const i=document.getElementById('msgInput'),s=i.selectionStart,e2=i.selectionEnd;i.value=i.value.substring(0,s)+e+i.value.substring(e2);i.selectionStart=i.selectionEnd=s+e.length;i.focus();toggleEmoji()}

// ========== 输入状态 ==========
function updateInput(){
  const a=document.getElementById('inputArea'),n=document.getElementById('guestNotice');
  if(state.cansend){a.style.display='flex';n.style.display='none'}
  else if(state.myUid>0){a.style.display='none';n.style.display='block';n.textContent='你暂时无法发言'}
  else{a.style.display='none';n.style.display='block';n.textContent='登录后即可参与聊天'}
}

// ========== 初始化 ==========
async function init(){
  initEmoji();
  const input=document.getElementById('msgInput');
  input.addEventListener('keydown',e=>{if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();send()}});
  input.addEventListener('input',()=>{input.style.height='36px';input.style.height=Math.min(input.scrollHeight,90)+'px'});
  document.addEventListener('click',e=>{const p=document.getElementById('emojiPanel');if(!e.target.closest('.emoji-btn')&&!p.contains(e.target))p.classList.remove('show')});

  // 🔍 调试：确认 init 执行
  console.log('[INIT] 聊天室页面初始化开始');

  await fetchFormhash();

  // 🔍 调试：确认 formhash
  console.log('[INIT] formhash:', state.formhash);

  // 🔍 调试：首次加载
  console.log('[INIT] 开始加载历史消息...');
  const r = await api('list', {}, 'GET');
  console.log('[INIT] 首次 API 返回:', JSON.stringify(r).substring(0, 500));

  if (r.ok && r.data && r.data.you) {
    state.myUid = r.data.you.uid || 0;
    state.cansend = !!r.data.you.cansend;
    console.log('[INIT] you 信息:', JSON.stringify(r.data.you));
    info(state.cansend ? '已登录 ✅' : '游客模式 ❌ uid=' + state.myUid);
  }

  // 正常流程
  await fetchMsgs(true);
  setInterval(()=>fetchMsgs(false),5000);
  document.addEventListener('visibilitychange',()=>{if(!document.hidden)fetchMsgs(false)});
}
init();
</script>
</body>
</html>
